services:
  - type: web
    name: truthlens-backend
    env: python
    plan: free # Added so Render won't charge or ask for credit card
    region: oregon
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://truthlens.vercel.app,http://localhost:5173" # Update with actual vercel domain
